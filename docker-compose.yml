services:

  postgres:
    image: postgres:16-alpine
    container_name: smartprice-postgres
    environment:
      POSTGRES_DB:       smartprice
      POSTGRES_USER:     smartprice
      POSTGRES_PASSWORD: smartprice
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartprice"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartprice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smartprice-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smartprice-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:               zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:            PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      retries: 10

volumes:
  postgres-data:
  redis-data:
